<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TM Coach</title>
  <link rel="icon" type="image/x-icon" href="https://cdn2.iconfinder.com/data/icons/artificial-intelligence-6/64/ArtificialIntelligence9-512.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      content: ['./*.html', './js/*.js'],
      theme: {
        extend: {}
      },
      plugins: []
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .transition-colors {
      transition-property: background-color, border-color, color, fill, stroke;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      transition-duration: 150ms;
    }
  </style>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors">

  <button id="theme-toggle" class="fixed top-4 right-4 p-2 rounded-full bg-gray-200 dark:bg-gray-700">
    <svg id="sun-icon" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
    </svg>
    <svg id="moon-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
    </svg>
  </button>

  <div id="login-screen" class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900">
    <div class="card p-8 max-w-md w-full">
      <h1 class="text-3xl font-bold text-center mb-6 text-blue-600 dark:text-blue-400">TM Coach</h1>
      <p class="text-center mb-8 text-gray-600 dark:text-gray-300">Your personal time management coach</p>
      <div class="space-y-4">
        <button id="google-signin-btn" class="btn btn-primary w-full flex items-center justify-center">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo" class="w-5 h-5 mr-2">
          Sign in with Google
        </button>
        <button id="skip-login-btn" class="btn btn-secondary w-full">Continue without Login</button>
      </div>
    </div>
  </div>

  <div id="main-app" class="hidden min-h-screen bg-gray-100 dark:bg-gray-800 flex flex-col">
    <nav class="bg-white dark:bg-gray-900 shadow-md">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
          <div class="flex items-center">
            <span class="text-xl font-bold text-blue-600 dark:text-blue-400">TM Coach</span>
          </div>
          <div class="flex items-center space-x-4">
            <span id="user-name" class="text-gray-700 dark:text-gray-300"></span>
            <img id="user-avatar" class="w-8 h-8 rounded-full" src="" alt="User avatar">
            <button id="logout-btn" class="btn btn-secondary">Logout</button>
          </div>
        </div>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-1 space-y-8">
          <div class="card p-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-900 dark:text-gray-100">Pomodoro Timer</h2>
            <div class="text-center">
              <div id="timer-display" class="text-5xl font-bold mb-4 text-gray-900 dark:text-gray-100">25:00</div>
              <div class="flex justify-center space-x-4">
                <button id="start-timer" class="btn btn-primary">Start</button>
                <button id="pause-timer" class="btn btn-secondary">Pause</button>
                <button id="reset-timer" class="btn btn-secondary">Reset</button>
              </div>
              <div class="mt-6">
                <select id="timer-mode" class="form-input w-full">
                  <option value="pomodoro">Pomodoro (25 min)</option>
                  <option value="shortBreak">Short Break (5 min)</option>
                  <option value="longBreak">Long Break (15 min)</option>
                </select>
              </div>
            </div>
          </div>

          <div class="card p-6">
            <div class="flex justify-between items-center mb-6">
              <h2 class="text-xl font-semibold text-gray-900 dark:text-gray-100">My Tasks</h2>
              <button id="sync-tasks-btn" class="btn btn-primary text-sm">Sync Tasks</button>
            </div>
            <div id="tasks-container" class="space-y-3"></div>
            <div class="mt-6">
              <form id="add-task-form" class="space-y-4">
                <input type="text" id="new-task-input" placeholder="Add a new task..." class="form-input w-full">
                <input type="datetime-local" id="task-due" class="form-input w-full">
                <button type="submit" class="btn btn-primary w-full">Add Task</button>
              </form>
            </div>
          </div>
        </div>

        <div class="lg:col-span-2">
          <div class="card p-6">
            <h2 class="text-xl font-semibold mb-6 text-gray-900 dark:text-gray-100">Time Management Coach</h2>
            <div id="chat-container" class="h-96 overflow-y-auto mb-4 space-y-4 p-4 bg-gray-100 dark:bg-gray-800 rounded-lg"></div>
            <form id="chat-form" class="flex space-x-2">
              <input type="text" id="user-input" placeholder="Type your message..." class="form-input flex-grow">
              <button type="submit" class="btn btn-primary">Send</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <footer class="bg-white dark:bg-gray-800 shadow-md mt-auto border-t border-gray-200 dark:border-gray-700">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
        <div class="flex flex-col items-center justify-center space-y-1">
          <div class="flex items-center space-x-1">
            <svg class="w-4 h-4 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
            <p class="text-sm font-medium text-gray-700 dark:text-gray-300">Developed by</p>
          </div>
          <p class="text-base font-bold text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 transition-colors duration-200">Aakash Deep Yadav</p>
          <div class="flex items-center space-x-1">
            <svg class="w-3 h-3 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="text-xs text-gray-500 dark:text-gray-400">Reg. No.: 12305420</p>
          </div>
        </div>
      </div>
    </footer>
  </div>

  <script src="config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/pomodoro.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
