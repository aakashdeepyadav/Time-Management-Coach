<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Management Coach | AI Productivity Assistant</title>
  <meta name="description" content="Time Management Coach is an AI-powered productivity web app with coaching chat, Pomodoro timer, and task planning to help students and professionals stay focused.">
  <meta name="keywords" content="time management, productivity coach, pomodoro timer, AI coach, task planner, student productivity">
  <meta name="author" content="Aakash">
  <meta property="og:title" content="Time Management Coach">
  <meta property="og:description" content="AI-powered productivity coach with Pomodoro, task tracking, and actionable planning.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=1200&q=80">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      content: ['./*.html', './js/*.js'],
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              200: '#bae6fd',
              300: '#7dd3fc',
              400: '#38bdf8',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
              800: '#075985',
              900: '#0c4a6e',
              950: '#082f49',
            },
            surface: {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              300: '#cbd5e1',
              400: '#94a3b8',
              500: '#64748b',
              600: '#475569',
              700: '#334155',
              800: '#1e293b',
              900: '#0f172a',
              950: '#020617',
            }
          },
          fontFamily: {
            sans: ['Segoe UI', 'Arial', 'Helvetica Neue', 'system-ui', 'sans-serif'],
          }
        }
      },
      plugins: []
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    
    body {
      font-feature-settings: "cv02", "cv03", "cv04", "cv11";
    }

    .transition-all-custom {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-[100] focus:rounded-md focus:bg-brand-600 focus:px-3 focus:py-2 focus:text-sm focus:font-semibold focus:text-white">Skip to main content</a>

  <button id="theme-toggle" class="theme-toggle fixed top-4 right-4 p-2 rounded-full bg-gray-200 dark:bg-gray-700" aria-label="Toggle theme">
    <svg id="sun-icon" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
    </svg>
    <svg id="moon-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
    </svg>
  </button>

  <div id="login-screen" class="min-h-screen flex items-center justify-center bg-surface-50 dark:bg-surface-950 p-4">
    <div class="card login-card p-10 max-w-md w-full relative overflow-hidden">
      <div class="absolute top-0 left-0 right-0 h-1 bg-brand-500"></div>
      
      <div class="relative z-10">
        <div class="flex justify-center mb-6">
          <div class="brand-mark w-16 h-16 bg-brand-500 rounded-2xl flex items-center justify-center shadow-sm">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
        </div>
        <h1 class="text-3xl font-bold text-center mb-2 tracking-tight text-surface-900 dark:text-surface-50">Time Management Coach</h1>
        <p class="text-center mb-8 text-surface-500 dark:text-surface-400 font-medium">Structured planning for focused execution</p>
        
        <div class="space-y-3">
          <button id="google-signin-btn" class="btn btn-primary w-full text-base py-3">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo" class="w-5 h-5 mr-1">
            Sign in with Google
          </button>
          <button id="skip-login-btn" class="btn btn-secondary w-full text-base py-3">Continue without Login</button>
        </div>
      </div>
    </div>
  </div>

  <div id="main-app" class="hidden h-screen bg-surface-50 dark:bg-surface-950 flex flex-col overflow-hidden">
    <nav class="app-nav sticky top-0 z-50 border-b border-surface-100 dark:border-surface-800">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
          <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center shadow-sm">
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </div>
            <span class="text-xl font-bold tracking-tight text-surface-900 dark:text-surface-50">Time Management Coach</span>
          </div>
          <div class="flex items-center space-x-6">
            <div class="hidden sm:flex items-center space-x-3">
              <span id="user-name" class="text-sm font-semibold text-surface-700 dark:text-surface-300"></span>
              <img id="user-avatar" class="w-8 h-8 rounded-full border-2 border-surface-100 dark:border-surface-800" src="" alt="User avatar">
            </div>
            <button id="logout-btn" class="btn btn-secondary py-1.5 px-4 text-sm">Logout</button>
          </div>
        </div>
      </div>
    </nav>

    <main id="main-content" class="max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-4 flex-grow min-h-0 overflow-hidden">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full min-h-0">
        <!-- Sidebar -->
        <div class="lg:col-span-4 space-y-6 min-h-0 overflow-y-auto pr-1">
          <!-- Pomodoro -->
          <section class="card module-card p-6">
            <div class="flex items-center space-x-3 mb-6">
              <div class="section-icon p-2 rounded-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
              </div>
              <h2 class="section-title text-lg font-bold text-surface-900 dark:text-surface-50">Pomodoro Timer</h2>
            </div>
            
            <div class="text-center">
              <div id="timer-display" class="text-6xl font-bold mb-8 tracking-tighter text-surface-900 dark:text-surface-50">25:00</div>
              <div class="flex justify-center gap-3">
                <button id="start-timer" class="btn btn-primary flex-1">Start</button>
                <button id="pause-timer" class="btn btn-secondary flex-1">Pause</button>
                <button id="reset-timer" class="btn btn-secondary">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                  </svg>
                </button>
              </div>
              <div class="mt-8">
                <select id="timer-mode" class="form-input w-full font-medium text-surface-700 dark:text-surface-300">
                  <option value="pomodoro">Focus Session (25 min)</option>
                  <option value="shortBreak">Short Break (5 min)</option>
                  <option value="longBreak">Long Break (15 min)</option>
                </select>
              </div>
            </div>
          </section>

          <!-- Tasks -->
          <section class="card module-card p-6">
            <div class="flex justify-between items-center mb-6">
              <div class="flex items-center space-x-3">
                <div class="section-icon p-2 rounded-lg">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                  </svg>
                </div>
                <h2 class="section-title text-lg font-bold text-surface-900 dark:text-surface-50">My Tasks</h2>
              </div>
              <button id="sync-tasks-btn" class="text-xs font-bold text-brand-600 dark:text-brand-400 hover:underline">Sync Google Tasks</button>
            </div>
            <div id="tasks-container" class="space-y-4 max-h-64 overflow-y-auto pr-2 chat-container"></div>
            <div class="mt-8">
              <form id="add-task-form" class="space-y-4">
                <input type="text" id="new-task-input" placeholder="What needs to be done?" class="form-input w-full">
                <div class="flex gap-3">
                  <input type="datetime-local" id="task-due" class="form-input flex-grow text-sm">
                  <button type="submit" class="btn btn-primary px-4">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                    </svg>
                  </button>
                </div>
              </form>
            </div>
          </section>
        </div>

        <!-- Chat Coach -->
        <div class="lg:col-span-8 min-h-0">
          <section class="card module-card h-full flex flex-col p-6 min-h-0">
            <div class="coach-header flex items-center justify-between mb-6 gap-4 flex-wrap">
              <div class="flex items-center space-x-3">
              <div class="section-icon p-2 rounded-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                </svg>
              </div>
              <div>
                <h2 class="text-lg font-bold text-surface-900 dark:text-surface-50 leading-tight">AI Coach</h2>
                <p class="text-xs text-surface-500 font-medium">Structured planning assistant</p>
              </div>
            </div>
              <div class="flex items-center gap-2">
                <label class="coach-toggle" for="auto-task-toggle">
                  <span class="coach-toggle__text">Add tasks only on request</span>
                  <input id="auto-task-toggle" type="checkbox">
                  <span class="coach-toggle__slider" aria-hidden="true"></span>
                </label>
                <button id="reset-coach-memory" type="button" class="btn btn-secondary text-xs px-3 py-2">Reset Memory</button>
              </div>
            </div>
            
            <div id="chat-container" class="flex-grow overflow-y-auto mb-8 space-y-6 pr-4 chat-container"></div>
            
            <form id="chat-form" class="relative">
              <input type="text" id="user-input" placeholder="Describe your goal or schedule request" 
                     class="form-input w-full pr-14 py-4 text-base shadow-sm">
              <button type="submit" class="send-btn absolute right-2 top-1/2 -translate-y-1/2 p-2.5 text-white rounded-lg transition-all" aria-label="Send message">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                </svg>
              </button>
            </form>
          </section>
        </div>
      </div>
    </main>

    <footer class="bg-white dark:bg-gray-800 mt-auto border-t border-gray-200 dark:border-gray-700">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-2 text-center">
        <p class="text-sm text-surface-500 dark:text-surface-400">Made with ❤️ by Aakash.</p>
      </div>
    </footer>
  </div>

  <script src="config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/pomodoro.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
